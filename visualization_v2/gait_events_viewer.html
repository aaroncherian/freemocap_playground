<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Gait Visualization</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<script src="https://cdn.plot.ly/plotly-2.33.0.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=IBM+Plex+Mono:wght@300;400;500&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

  :root {
    --bg: #f4efe8;
    --surface: #ebe5db;
    --surface-hover: #e2dbd0;
    --border: #d4cbbf;
    --text: #3a3028;
    --text-dim: #8a7e70;
    --accent-hs: #c0623a;
    --accent-hs-soft: rgba(192, 98, 58, 0.12);
    --accent-to: #01575a;
    --accent-to-soft: rgba(45, 107, 79, 0.12);
    --bone: #5c4a3a;
    --joint: #6b5847;
  }

  html, body {
    height: 100%; overflow: hidden;
    background: var(--bg); color: var(--text);
    font-family: 'Crimson Pro', Georgia, serif;
  }

  #app { display: grid; grid-template-rows: auto auto 1fr auto; height: 100%; }

  /* ── Loading ── */
  #loading {
    position: fixed; inset: 0; z-index: 100;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 14px;
    background: var(--bg); font-size: 15px; color: var(--text-dim);
  }
  #loading .spinner { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--accent-hs); border-radius: 50%; animation: spin 0.9s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading.hidden { display: none; }

  /* ── Header ── */
  header {
    padding: 12px 28px 8px;
    display: flex; align-items: baseline; gap: 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  header h1 { font-size: 18px; font-weight: 500; letter-spacing: 0.02em; }
  header .subtitle { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text-dim); }

  /* ── Layer Toggle Bar ── */
  #layer-bar {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 28px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    font-family: 'IBM Plex Mono', monospace; font-size: 11px;
  }
  #layer-bar .bar-label { color: var(--text-dim); margin-right: 8px; letter-spacing: 0.04em; text-transform: uppercase; font-size: 10px; }

  .layer-btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 12px; border-radius: 3px;
    border: 1px solid var(--border);
    background: none; color: var(--text-dim);
    cursor: pointer; font-family: inherit; font-size: 11px;
    transition: all 0.15s ease;
  }
  .layer-btn:hover { border-color: var(--text-dim); background: var(--surface-hover); }
  .layer-btn.active { border-color: var(--bone); color: var(--text); background: rgba(92, 74, 58, 0.08); }
  .layer-btn .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-dim); transition: background 0.15s; }
  .layer-btn.active .dot { background: var(--accent-hs); }

  /* ── Canvas ── */
  #canvas-wrap { position: relative; overflow: hidden; min-height: 0; }
  canvas { display: block; width: 100%; height: 100%; }

  /* ── Toasts, phase bar, legend, cycle info — same as before ── */
  .event-toast { position: absolute; top: 20px; right: 20px; padding: 8px 18px; border-radius: 4px; font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; pointer-events: none; opacity: 0; transform: translateY(-6px); transition: opacity 0.15s ease, transform 0.15s ease; }
  .event-toast.show { opacity: 1; transform: translateY(0); }
  .event-toast.hs { background: var(--accent-hs-soft); border: 1px solid rgba(192,98,58,0.35); color: var(--accent-hs); }
  .event-toast.to { background: var(--accent-to-soft); border: 1px solid rgba(1,87,90,0.35); color: var(--accent-to); }
  .phase-bar { position: absolute; bottom: 0; left: 0; right: 0; height: 3px; transition: background 0.3s ease; }
  .phase-bar.stance { background: linear-gradient(90deg, var(--accent-hs), rgba(192,98,58,0.15)); }
  .phase-bar.swing { background: linear-gradient(90deg, var(--accent-to), rgba(1,87,90,0.15)); }
  .legend { position: absolute; bottom: 16px; left: 18px; display: flex; flex-direction: column; gap: 5px; font-family: 'IBM Plex Mono', monospace; font-size: 10px; }
  .legend-item { display: flex; align-items: center; gap: 7px; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }
  .legend-dot.hs { background: var(--accent-hs); }
  .legend-dot.to { background: var(--accent-to); }
  .cycle-info { position: absolute; top: 20px; left: 20px; font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text-dim); line-height: 1.7; }
  .cycle-info .val { color: var(--text); font-weight: 500; }

  /* ── Joint Angle Panel ── */
  #angle-panel {
    display: none; /* shown when layer active */
    border-top: 1px solid var(--border);
    background: var(--bg);
    overflow: hidden;
  }
  #angle-panel.visible { display: block; }
  #angle-controls {
    display: flex; align-items: center; gap: 12px;
    padding: 6px 28px;
    font-family: 'IBM Plex Mono', monospace; font-size: 11px;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  #angle-controls select {
    font-family: inherit; font-size: 11px;
    padding: 2px 6px; border: 1px solid var(--border);
    border-radius: 3px; background: var(--bg); color: var(--text);
  }
  #angle-plots {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 4px; padding: 4px 12px 8px;
    height: 200px;
  }
  #angle-plots .plot { min-width: 0; height: 100%; }

  /* ── Footer ── */
  footer {
    padding: 10px 28px;
    display: flex; align-items: center; gap: 16px;
    border-top: 1px solid var(--border);
    background: var(--surface); flex-wrap: wrap;
  }
  footer button { background: none; border: 1px solid var(--border); color: var(--text); padding: 5px 14px; border-radius: 3px; cursor: pointer; font-family: 'IBM Plex Mono', monospace; font-size: 11px; transition: border-color 0.2s, background 0.2s; }
  footer button:hover { border-color: var(--text-dim); background: var(--surface-hover); }
  .speed-control { display: flex; align-items: center; gap: 8px; font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text-dim); }
  .speed-control input[type=range] { width: 90px; accent-color: var(--accent-hs); }
  .scrubber { flex: 1; min-width: 180px; display: flex; align-items: center; gap: 8px; }
  .scrubber input[type=range] { flex: 1; accent-color: var(--bone); }
  .frame-display { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text-dim); }
  .frame-display .val { color: var(--text); font-weight: 500; }

  /* ── Gait Cycle Progress Bars (stacked R + L) ── */
  .gait-cycle-wrap {
    display: none;
    position: absolute; bottom: 18px; right: 18px;
    width: 320px;
    font-family: 'IBM Plex Mono', monospace;
  }
  .gait-cycle-wrap.visible { display: block; }
  .gcw-title {
    font-size: 9px; color: var(--text-dim);
    letter-spacing: 0.05em; text-transform: uppercase;
    margin-bottom: 6px;
  }
  .gcb-row {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 5px;
  }
  .gcb-row:last-child { margin-bottom: 0; }
  .gcb-side-label {
    width: 14px; flex-shrink: 0;
    font-size: 11px; font-weight: 500;
    color: var(--text);
    text-align: right;
  }
  .gcb-track {
    position: relative; flex: 1; height: 22px;
    border-radius: 3px; overflow: visible;
    background: rgba(212, 203, 191, 0.5);
    border: 1px solid rgba(0,0,0,0.06);
  }
  .gcb-stance {
    position: absolute; left: 0; top: 0; bottom: 0;
    border-radius: 3px 0 0 3px;
    transition: width 0.1s ease;
  }
  .gcb-swing {
    position: absolute; top: 0; bottom: 0;
    border-radius: 0 3px 3px 0;
    transition: left 0.1s ease, width 0.1s ease;
  }
  .gcb-stance.hs-color { background: var(--accent-hs); opacity: 0.30; }
  .gcb-swing.to-color  { background: var(--accent-to); opacity: 0.30; }
  .gcb-marker {
    position: absolute; top: -3px; bottom: -3px; width: 2.5px;
    background: var(--text);
    border-radius: 1px;
    transition: left 0.05s linear;
    z-index: 2;
  }
  .gcb-phase-label {
    position: absolute; top: 50%; transform: translateY(-50%);
    font-size: 9px; letter-spacing: 0.03em; color: var(--text-dim);
    pointer-events: none;
  }
  .gcb-phase-label.stance-lbl { left: 6px; }
  .gcb-phase-label.swing-lbl  { right: 6px; }
  .gcb-event-tick {
    position: absolute; top: -1px; bottom: -1px; width: 1px;
    background: var(--text-dim);
    opacity: 0.5;
  }
  .gcb-event-tick-label {
    position: absolute; top: -13px;
    font-size: 8px; color: var(--text-dim);
    transform: translateX(-50%);
  }
  .gcb-info {
    display: flex; justify-content: space-between;
    font-size: 9px; color: var(--text-dim);
    margin-top: 4px; padding: 0 22px;
  }
  .gcb-info .val { color: var(--text); font-weight: 500; }
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div><div>Loading …</div></div>

<div id="app">
  <header>
    <h1>Gait Visualization</h1>
    <span class="subtitle" id="subtitle">Loading …</span>
  </header>

  <div id="layer-bar">
    <span class="bar-label">Layers</span>
    <!-- populated dynamically -->
  </div>

  <div id="canvas-wrap">
    <canvas id="c"></canvas>
    <div class="event-toast hs" id="toast-hs">Heel Strike</div>
    <div class="event-toast to" id="toast-to">Toe Off</div>
    <div class="phase-bar" id="phase-bar"></div>
    <div class="legend" id="gait-legend" style="display:none">
      <div class="legend-item"><div class="legend-dot hs"></div><span style="color:var(--accent-hs)">Heel Strike</span></div>
      <div class="legend-item"><div class="legend-dot to"></div><span style="color:var(--accent-to)">Toe Off</span></div>
    </div>
    <div class="cycle-info" id="cycle-info"></div>

    <!-- Gait cycle progress bars — stacked R + L (shown when gait_phases layer active) -->
    <div class="gait-cycle-wrap" id="gait-cycle-wrap">
      <div class="gcw-title">Gait Cycle</div>

      <!-- Right leg -->
      <div class="gcb-row">
        <div class="gcb-side-label">R</div>
        <div class="gcb-track" id="gcb-track-r">
          <div class="gcb-stance hs-color" id="gcb-stance-r"></div>
          <div class="gcb-swing to-color" id="gcb-swing-r"></div>
          <div class="gcb-phase-label stance-lbl">Stance</div>
          <div class="gcb-phase-label swing-lbl">Swing</div>
          <div class="gcb-event-tick" id="gcb-to-tick-r"><div class="gcb-event-tick-label">TO</div></div>
          <div class="gcb-marker" id="gcb-marker-r"></div>
        </div>
      </div>

      <!-- Left leg -->
      <div class="gcb-row">
        <div class="gcb-side-label">L</div>
        <div class="gcb-track" id="gcb-track-l">
          <div class="gcb-stance hs-color" id="gcb-stance-l"></div>
          <div class="gcb-swing to-color" id="gcb-swing-l"></div>
          <div class="gcb-phase-label stance-lbl">Stance</div>
          <div class="gcb-phase-label swing-lbl">Swing</div>
          <div class="gcb-event-tick" id="gcb-to-tick-l"><div class="gcb-event-tick-label">TO</div></div>
          <div class="gcb-marker" id="gcb-marker-l"></div>
        </div>
      </div>

      <div class="gcb-info">
        <span>R: <span class="val" id="gcb-pct-r">0</span>%</span>
        <span>L: <span class="val" id="gcb-pct-l">0</span>%</span>
      </div>
    </div>
  </div>

  <div id="angle-panel">
    <div id="angle-controls">
      <label>Joint: <select id="angle-joint"></select></label>
      <label>Side: <select id="angle-side"><option value="both">Both</option><option value="left">Left</option><option value="right">Right</option></select></label>
    </div>
    <div id="angle-plots">
      <div id="aplot0" class="plot"></div>
      <div id="aplot1" class="plot"></div>
      <div id="aplot2" class="plot"></div>
    </div>
  </div>

  <footer>
    <button id="btn-play">Pause</button>
    <button id="btn-reset">Reset</button>
    <div class="speed-control">
      <span>Speed</span>
      <input type="range" id="speed" min="0.1" max="2" step="0.1" value="0.6"/>
      <span id="speed-val">0.6×</span>
    </div>
    <div class="scrubber">
      <input type="range" id="scrubber" min="0" max="0" step="1" value="0"/>
    </div>
    <div class="frame-display">
      Frame <span class="val" id="frame-num">0</span> / <span id="frame-total">0</span>
    </div>
  </footer>
</div>

<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/"
} }
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const PAL = {
  bg: 0xf4efe8, ground: 0xe8e2d8, grid: 0xd6cfc4,
  bone: 0x5c4a3a, joint: 0x6b5847, jointEmit: 0x4a3a2c,
  hs: 0xc0623a, to: 0x01575a, fog: 0xf4efe8,
};

// ─── Load main data ──────────────────────────────────────────────
const loadingEl = document.getElementById('loading');
let data;
try {
  const r = await fetch('/gait_data.json');
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  data = await r.json();
} catch (err) {
  loadingEl.innerHTML = `<div style="color:var(--accent-hs)">${err.message}</div><div style="margin-top:8px;font-size:12px;color:var(--text-dim)">Make sure gait_events_server.py is running.</div>`;
  throw err;
}

const { positions, connections: rawConns, landmarks, gait_events: gaitEvents,
        landmark_indices: landmarkIndices, fps, tracker, available_layers } = data;
const totalFrames = positions.length;
const numMarkers = positions[0].length;
const heelStrikes = gaitEvents.heel_strikes || [];
const toeOffs = gaitEvents.toe_offs || [];

const nameToIdx = new Map();
landmarks.forEach((n,i) => nameToIdx.set(n,i));

const connections = [];
if (Array.isArray(rawConns)) {
  rawConns.forEach(conn => {
    let a,b;
    if (Array.isArray(conn)){[a,b]=conn;} else if(conn?.proximal&&conn?.distal){a=conn.proximal;b=conn.distal;} else return;
    const ia=typeof a==='number'?a:nameToIdx.get(a), ib=typeof b==='number'?b:nameToIdx.get(b);
    if(ia!=null&&ib!=null) connections.push([ia,ib]);
  });
}

document.getElementById('subtitle').textContent = `${tracker}  ·  ${totalFrames} frames @ ${fps} Hz`;
document.getElementById('frame-total').textContent = totalFrames - 1;
const scrubber = document.getElementById('scrubber');
scrubber.max = String(totalFrames - 1);
loadingEl.classList.add('hidden');

// ═══════════════════════════════════════════════════════════════════
// LAYER SYSTEM
// ═══════════════════════════════════════════════════════════════════
const layerState = {};
const layerBar = document.getElementById('layer-bar');

function createLayerButton(layer) {
  const btn = document.createElement('button');
  btn.className = 'layer-btn';
  btn.innerHTML = `<span class="dot"></span>${layer.label}`;
  btn.dataset.layerId = layer.id;

  layerState[layer.id] = { active: false, data: null, btn };

  btn.addEventListener('click', async () => {
    const state = layerState[layer.id];
    state.active = !state.active;
    btn.classList.toggle('active', state.active);

    // Lazy-load layer data on first activation
    if (state.active && !state.data && layer.dataUrl) {
      try {
        const r = await fetch(layer.dataUrl);
        state.data = await r.json();
      } catch (e) { console.error(`Failed to load layer ${layer.id}:`, e); }
    }

    onLayerToggle(layer.id, state.active);
  });

  layerBar.appendChild(btn);
}

// Register available layers
(available_layers || []).forEach(l => createLayerButton(l));

// Auto-activate gait events if available
if (layerState.gait_events) {
  layerState.gait_events.active = true;
  layerState.gait_events.btn.classList.add('active');
  onLayerToggle('gait_events', true);
}

function onLayerToggle(id, active) {
  if (id === 'gait_events') {
    document.getElementById('gait-legend').style.display = active ? '' : 'none';
    document.getElementById('phase-bar').style.display = active ? '' : 'none';
  }
  if (id === 'joint_angles') {
    const panel = document.getElementById('angle-panel');
    panel.classList.toggle('visible', active);
    if (active && layerState.joint_angles.data) {
      initAnglePlots(layerState.joint_angles.data);
    }
    // Trigger resize so 3D view adjusts
    setTimeout(() => resize(), 50);
  }
}

function isLayerActive(id) { return layerState[id]?.active ?? false; }

// ═══════════════════════════════════════════════════════════════════
// JOINT ANGLE PLOTS
// ═══════════════════════════════════════════════════════════════════
const ANGLE_COLORS = {
  left: '#c0623a',   // burnt sienna
  right: '#01575a',  // teal
};

// Friendly display names for components
const COMP_LABELS = {
  flex_ext: 'Flexion / Extension',
  abd_add: 'Abduction / Adduction',
  int_ext: 'Internal / External Rot.',
  dorsi_plantar: 'Dorsiflexion / Plantarflexion',
  inv_ev: 'Inversion / Eversion',
};

let angleData = null;
let activeJoint = null;
let activeSide = 'both';
let anglePlotsReady = false;
let angleWindowHalf = 150;

function initAnglePlots(data) {
  angleData = data;
  const jointSelect = document.getElementById('angle-joint');
  jointSelect.innerHTML = '';
  data.joints.forEach(j => {
    const opt = document.createElement('option');
    opt.value = j; opt.textContent = j.charAt(0).toUpperCase() + j.slice(1);
    jointSelect.appendChild(opt);
  });
  activeJoint = data.joints[0];
  jointSelect.value = activeJoint;

  jointSelect.addEventListener('change', () => { activeJoint = jointSelect.value; drawAnglePlots(); });
  document.getElementById('angle-side').addEventListener('change', e => { activeSide = e.target.value; drawAnglePlots(); });

  drawAnglePlots();
  anglePlotsReady = true;
}

function getComponentsForJoint(joint) {
  if (!angleData) return [];
  // Find which components exist for this joint
  const available = angleData.components.filter(comp =>
    angleData.data[`left_${joint}_${comp}`] || angleData.data[`right_${joint}_${comp}`]
  );

  // Sort so primary movement is always first:
  // flex_ext first for hip/knee, dorsi_plantar first for ankle
  const priority = ['flex_ext', 'dorsi_plantar', 'abd_add', 'int_ext', 'inv_ev'];
  available.sort((a, b) => {
    const ia = priority.indexOf(a);
    const ib = priority.indexOf(b);
    return (ia === -1 ? 99 : ia) - (ib === -1 ? 99 : ib);
  });

  return available;
}

function drawAnglePlots() {
  if (!angleData || !activeJoint) return;
  const comps = getComponentsForJoint(activeJoint);

  // Show up to 3 plots
  const plotDivs = [document.getElementById('aplot0'), document.getElementById('aplot1'), document.getElementById('aplot2')];
  const plotGrid = document.getElementById('angle-plots');
  plotGrid.style.gridTemplateColumns = `repeat(${Math.min(comps.length, 3)}, 1fr)`;

  comps.slice(0, 3).forEach((comp, i) => {
    const div = plotDivs[i];
    div.style.display = '';
    const traces = [];
    const x = Array.from({length: totalFrames}, (_,k) => k);

    ['left', 'right'].forEach(side => {
      if (activeSide !== 'both' && activeSide !== side) return;
      const key = `${side}_${activeJoint}_${comp}`;
      const arr = angleData.data[key];
      if (!arr) return;
      traces.push({
        x, y: arr.slice(0, totalFrames),
        name: side.charAt(0).toUpperCase() + side.slice(1),
        mode: 'lines',
        line: { width: 1.5, color: ANGLE_COLORS[side] },
        hovertemplate: `%{y:.1f}°<br>frame %{x}<extra>${side}</extra>`,
      });
    });

    const layout = {
      margin: { l: 40, r: 8, t: 24, b: 24 },
      title: { text: COMP_LABELS[comp] || comp, font: { family: 'IBM Plex Mono', size: 11, color: '#8a7e70' } },
      xaxis: { title: '', showgrid: false, range: [0, angleWindowHalf * 2] },
      yaxis: { title: '°', automargin: true, showgrid: true, gridcolor: '#e2dbd0', zeroline: true, zerolinecolor: '#d4cbbf' },
      showlegend: i === 0,
      legend: { orientation: 'h', x: 1, y: 1.15, xanchor: 'right', font: { family: 'IBM Plex Mono', size: 10 } },
      paper_bgcolor: 'rgba(0,0,0,0)', plot_bgcolor: 'rgba(0,0,0,0)',
      shapes: [{ type: 'line', xref: 'paper', yref: 'paper', x0: 0.5, x1: 0.5, y0: 0, y1: 1, line: { color: '#5c4a3a', width: 2, dash: 'solid' } }],
    };

    Plotly.newPlot(div, traces, layout, { responsive: true, displaylogo: false, modeBarButtonsToRemove: ['select2d', 'lasso2d'] });
  });

  // Hide unused divs
  for (let i = comps.length; i < 3; i++) plotDivs[i].style.display = 'none';
}

function updateAngleWindow(frame) {
  if (!anglePlotsReady || !isLayerActive('joint_angles')) return;
  const range = [frame - angleWindowHalf, frame + angleWindowHalf];
  ['aplot0', 'aplot1', 'aplot2'].forEach(id => {
    const div = document.getElementById(id);
    if (div.style.display !== 'none') {
      Plotly.relayout(div, { 'xaxis.range': range });
    }
  });
}

// ═══════════════════════════════════════════════════════════════════
// THREE.JS SCENE
// ═══════════════════════════════════════════════════════════════════
const canvas = document.getElementById('c');
const wrap = document.getElementById('canvas-wrap');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

class AngleLabel {
  constructor(side, joint) {
    this.side = side;
    this.joint = joint;
    this.key = `${side}_${joint}_${joint === 'ankle' ? 'dorsi_plantar' : 'flex_ext'}`;
    this.markerIdx = findJointIdx(ANGLE_JOINT_LANDMARKS[`${side}_${joint}`] || []);

    // Canvas for text rendering
    this.canvas = document.createElement('canvas');
    this.canvas.width = 128;
    this.canvas.height = 48;
    this.ctx = this.canvas.getContext('2d');

    this.texture = new THREE.CanvasTexture(this.canvas);
    this.texture.minFilter = THREE.LinearFilter;

    const mat = new THREE.SpriteMaterial({
      map: this.texture, transparent: true, depthTest: false, depthWrite: false,
    });
    this.sprite = new THREE.Sprite(mat);
    // Scale so it's readable but not huge
    const spriteScale = bodyHeight * 0.12;
    this.sprite.scale.set(spriteScale, spriteScale * 0.375, 1);
    this.sprite.visible = false;
    scene.add(this.sprite);

    this._lastText = '';
  }

  update(frame, pts) {
    if (this.markerIdx == null || !angleData) { this.sprite.visible = false; return; }

    const arr = angleData.data[this.key];
    if (!arr) { this.sprite.visible = false; return; }

    const val = arr[frame];
    if (val == null || isNaN(val)) { this.sprite.visible = false; return; }

    this.sprite.visible = true;

    // Position near the joint, offset to the side
    const p = pts[this.markerIdx];
    if (!p || isNaN(p[0])) { this.sprite.visible = false; return; }

    const xOff = this.side === 'left' ? angleLabelOffset : -angleLabelOffset;
    this.sprite.position.set(p[0] + xOff, p[1], p[2] + angleLabelOffset * 0.5);

    // Render text only if value changed (avoid thrashing)
    const text = val.toFixed(1) + '°';
    if (text !== this._lastText) {
      this._lastText = text;
      const ctx = this.ctx;
      ctx.clearRect(0, 0, 128, 48);

      // Subtle background pill
      ctx.fillStyle = 'rgba(244, 239, 232, 0.85)';
      ctx.beginPath();
      ctx.roundRect(4, 4, 120, 40, 6);
      ctx.fill();

      // Border
      ctx.strokeStyle = this.side === 'left' ? '#c0623a' : '#01575a';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.roundRect(4, 4, 120, 40, 6);
      ctx.stroke();

      // Text
      ctx.fillStyle = '#3a3028';
      ctx.font = '500 22px "IBM Plex Mono", monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(text, 64, 26);

      this.texture.needsUpdate = true;
    }
  }
}

// ═══════════════════════════════════════════════════════════════════

// Each arc needs 3 markers: proximal, center (the joint), distal
// The arc is drawn in the plane of those 3 points, centered at the joint,
// sweeping from one limb segment direction to the other.
const ARC_JOINT_TRIPLETS = {
  // [proximal_candidates, center_candidates, distal_candidates]
  left_hip:   [['trunk_center','neck_center','spine_mid','spine_top'], ['left_hip','l_hip'], ['left_knee','l_knee']],
  right_hip:  [['trunk_center','neck_center','spine_mid','spine_top'], ['right_hip','r_hip'], ['right_knee','r_knee']],
  left_knee:  [['left_hip','l_hip'], ['left_knee','l_knee'], ['left_ankle','l_ankle']],
  right_knee: [['right_hip','r_hip'], ['right_knee','r_knee'], ['right_ankle','r_ankle']],
  left_ankle: [['left_knee','l_knee'], ['left_ankle','l_ankle'], ['left_foot_index','left_toe','l_toe']],
  right_ankle:[['right_knee','r_knee'], ['right_ankle','r_ankle'], ['right_foot_index','right_toe','r_toe']],
};

// Joints whose arcs should be projected into the sagittal plane (YZ, normal = X)
const SAGITTAL_JOINTS = new Set(['left_hip', 'right_hip']);

const ARC_SEGMENTS = 24; // points along the arc curve
const ARC_RADIUS_FACTOR = 0.06; // fraction of body height

class JointAngleArc {
  constructor(side, joint) {
    this.side = side;
    this.joint = joint;
    this.key = `${side}_${joint}_${joint === 'ankle' ? 'dorsi_plantar' : 'flex_ext'}`;
    this.isSagittal = SAGITTAL_JOINTS.has(`${side}_${joint}`);

    const triplet = ARC_JOINT_TRIPLETS[`${side}_${joint}`];
    this.proxIdx = triplet ? findJointIdx(triplet[0]) : null;
    this.centIdx = triplet ? findJointIdx(triplet[1]) : null;
    this.distIdx = triplet ? findJointIdx(triplet[2]) : null;

    this.arcRadius = bodyHeight * ARC_RADIUS_FACTOR;

    // Line geometry for the arc
    const posArr = new Float32Array((ARC_SEGMENTS + 1) * 3);
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(posArr, 3));

    const color = side === 'left' ? 0xc0623a : 0x01575a;
    const mat = new THREE.LineBasicMaterial({
      color, transparent: true, opacity: 0.8, depthTest: false,
    });
    this.line = new THREE.Line(geo, mat);
    this.line.frustumCulled = false;
    this.line.visible = false;
    this.line.renderOrder = 10;
    scene.add(this.line);
  }

  update(frame, pts) {
    if (this.proxIdx == null || this.centIdx == null || this.distIdx == null || !angleData) {
      this.line.visible = false;
      return;
    }

    const angleArr = angleData.data[this.key];
    if (!angleArr) { this.line.visible = false; return; }
    const angleDeg = angleArr[frame];
    if (angleDeg == null || isNaN(angleDeg)) { this.line.visible = false; return; }

    const pA = pts[this.proxIdx]; // proximal
    const pB = pts[this.centIdx]; // center (joint)
    const pC = pts[this.distIdx]; // distal

    if (!pA || !pB || !pC || isNaN(pA[0]) || isNaN(pB[0]) || isNaN(pC[0])) {
      this.line.visible = false;
      return;
    }

    this.line.visible = true;

    // Vectors from center to proximal and distal
    let vA = new THREE.Vector3(pA[0]-pB[0], pA[1]-pB[1], pA[2]-pB[2]);
    let vC = new THREE.Vector3(pC[0]-pB[0], pC[1]-pB[1], pC[2]-pB[2]);

    let normal;

    if (this.isSagittal) {
      // Project both vectors into the sagittal plane (YZ plane, normal = X axis)
      // This constrains the arc to show rotation around the mediolateral axis
      vA.x = 0;
      vC.x = 0;

      if (vA.lengthSq() < 0.001 || vC.lengthSq() < 0.001) { this.line.visible = false; return; }

      vA.normalize();
      vC.normalize();

      // Fixed normal: both sides use the same direction so arcs both appear in front
      // +X makes the arc sweep forward (toward viewer from front/sagittal view)
      normal = new THREE.Vector3(-1, 0, 0);
    } else {
      // Standard: arc in the plane of the 3 markers
      vA.normalize();
      vC.normalize();
      normal = new THREE.Vector3().crossVectors(vA, vC).normalize();
    }

    // Angle between the two (projected) segment vectors
    const dot = THREE.MathUtils.clamp(vA.dot(vC), -1, 1);
    const sweepAngle = Math.acos(dot);

    if (normal.lengthSq() < 0.001) { this.line.visible = false; return; }

    // Build the arc: rotate vA toward vC across the full sweep
    const center = new THREE.Vector3(pB[0], pB[1], pB[2]);
    const arr = this.line.geometry.attributes.position.array;
    const steps = ARC_SEGMENTS;

    for (let i = 0; i <= steps; i++) {
      const t = i / steps;
      const theta = sweepAngle * t;

      // Rodrigues rotation of vA around normal by theta
      const cosT = Math.cos(theta);
      const sinT = Math.sin(theta);
      const nDotV = normal.dot(vA);
      const cross = new THREE.Vector3().crossVectors(normal, vA);

      const rotated = new THREE.Vector3(
        vA.x * cosT + cross.x * sinT + normal.x * nDotV * (1 - cosT),
        vA.y * cosT + cross.y * sinT + normal.y * nDotV * (1 - cosT),
        vA.z * cosT + cross.z * sinT + normal.z * nDotV * (1 - cosT),
      );

      arr[i*3]   = center.x + rotated.x * this.arcRadius;
      arr[i*3+1] = center.y + rotated.y * this.arcRadius;
      arr[i*3+2] = center.z + rotated.z * this.arcRadius;
    }

    this.line.geometry.attributes.position.needsUpdate = true;
    this.line.geometry.setDrawRange(0, steps + 1);
  }
}

}

// Create colored line overlays for each leg
function makeLegLines(count, color) {

  geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(count * 2 * 3), 3));
  const mat = new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.9, linewidth: 2 });

// Phase detection for both legs: returns 'stance' or 'swing' for a given side at a given frame
// Stance = between heel strike and next toe off (same side)
// Swing = between toe off and next heel strike (same side)
function getPhase(frame, side) {
  let lastHS = -1, lastTO = -1;
  for (const e of heelStrikes) if (e.side === side && e.frame <= frame) lastHS = e.frame;
  for (const e of toeOffs) if (e.side === side && e.frame <= frame) lastTO = e.frame;
  if (lastHS < 0) return 'unknown';
  return lastHS >= lastTO ? 'stance' : 'swing';
}

// Get gait cycle progress for a given side (0-100%)
// Cycle = HS to next HS; also returns stance/swing boundary
function getGaitCycleInfo(frame, side) {
  const sideHS = heelStrikes.filter(e => e.side === side).map(e => e.frame);
  const sideTO = toeOffs.filter(e => e.side === side).map(e => e.frame);

  let prevHS = -1, nextHS = -1;
  for (const f of sideHS) { if (f <= frame) prevHS = f; }
  for (const f of sideHS) { if (f > frame) { nextHS = f; break; } }

  if (prevHS < 0 || nextHS < 0) return null;

  const cycleDur = nextHS - prevHS;
  const pct = ((frame - prevHS) / cycleDur) * 100;

  // Find toe off within this cycle
  let toFrame = -1;
  for (const f of sideTO) { if (f > prevHS && f < nextHS) { toFrame = f; break; } }
  const toPct = toFrame >= 0 ? ((toFrame - prevHS) / cycleDur) * 100 : 62;

  return { pct, toPct, cycleDur, prevHS, nextHS };
}

function updateGaitPhases(frame, pts) {
  const active = isLayerActive('gait_phases');
  legLinesL.visible = active;
  legLinesR.visible = active;
  gcWrap.classList.toggle('visible', active);

  if (!active) return;

  // Determine phase for each leg
  const phaseL = getPhase(frame, 'left');
  const phaseR = getPhase(frame, 'right');

  // Color the leg overlays
  legLinesL.material.color.copy(phaseL === 'stance' ? STANCE_COLOR_L : SWING_COLOR_L);
  legLinesR.material.color.copy(phaseR === 'stance' ? STANCE_COLOR_R : SWING_COLOR_R);

  // Update leg line positions
  [
    { lines: legLinesL, indices: legConnL },
    { lines: legLinesR, indices: legConnR },
  ].forEach(({ lines, indices }) => {
    const arr = lines.geometry.attributes.position.array;
    let o = 0;
    indices.forEach(ci => {
      const [a,b] = connections[ci];
      const pa = pts[a], pb = pts[b];
      if (pa && pb && !isNaN(pa[0]) && !isNaN(pb[0])) {
        arr[o++]=pa[0]; arr[o++]=pa[1]; arr[o++]=pa[2];
        arr[o++]=pb[0]; arr[o++]=pb[1]; arr[o++]=pb[2];
      } else { for(let n=0;n<6;n++) arr[o++]=NaN; }
    });
    lines.geometry.attributes.position.needsUpdate = true;
  });

  // Update both gait cycle bars
  updateCycleBar(frame, 'right');
  updateCycleBar(frame, 'left');
}

  for(let i=0;i<numMarkers;i++){const[x,y,z]=pts[i];if(isNaN(x)||isNaN(y)||isNaN(z))tmp.makeScale(0,0,0);else tmp.makeTranslation(x,y,z);jointMesh.setMatrixAt(i,tmp);}
  jointMesh.instanceMatrix.needsUpdate=true;

  if(lineSegments){const a=lineSegments.geometry.attributes.position.array;let o=0;connections.forEach(([ai,bi])=>{const pa=pts[ai],pb=pts[bi];if(pa&&pb&&!isNaN(pa[0])&&!isNaN(pb[0])){a[o++]=pa[0];a[o++]=pa[1];a[o++]=pa[2];a[o++]=pb[0];a[o++]=pb[1];a[o++]=pb[2];}else{for(let n=0;n<6;n++)a[o++]=NaN;}});lineSegments.geometry.attributes.position.needsUpdate=true;}

  updateCam(pts[pelvisIdx]);
  keyLight.position.set(pts[pelvisIdx][0]+1000,pts[pelvisIdx][1]-2000,3000);

  // Gait events (only if layer active)
  if (isLayerActive('gait_events')) {
    const hs=hsMap.get(currentFrame);
    if(hs){const idx=hs.side==='left'?lHeelIdx:rHeelIdx;if(idx!=null){const p=pts[idx];hsRings[hsRi%6].trigger(p[0],p[1],p[2]);hsRi++;}toastHS.textContent=`Heel Strike · ${hs.side}`;toastHS.classList.add('show');clearTimeout(toastHST);toastHST=setTimeout(()=>toastHS.classList.remove('show'),500);}
    const to=toMap.get(currentFrame);
    if(to){const idx=to.side==='left'?lToeIdx:rToeIdx;if(idx!=null){const p=pts[idx];toRings[toRi%6].trigger(p[0],p[1],p[2]);toRi++;}toastTO.textContent=`Toe Off · ${to.side}`;toastTO.classList.add('show');clearTimeout(toastTOT);toastTOT=setTimeout(()=>toastTO.classList.remove('show'),500);}

    let lrhs=-1,lrto=-1;
    for(const e of heelStrikes)if(e.side==='right'&&e.frame<=currentFrame)lrhs=e.frame;
    for(const e of toeOffs)if(e.side==='right'&&e.frame<=currentFrame)lrto=e.frame;
    const stance=lrhs>=0&&lrhs>=lrto;
    phaseBar.className=`phase-bar ${stance?'stance':'swing'}`;
    cycleInfo.innerHTML=`<div>Phase: <span class="val">${stance?'Stance':'Swing'}</span> (R)</div><div>Events: <span class="val">${heelStrikes.length}</span> HS · <span class="val">${toeOffs.length}</span> TO</div><div>Tracker: <span class="val">${tracker}</span></div>`;
  } else {
    cycleInfo.innerHTML = `<div>Tracker: <span class="val">${tracker}</span></div>`;
    phaseBar.className = 'phase-bar';
  }

  document.getElementById('frame-num').textContent=currentFrame;
  scrubber.value=String(currentFrame);
  hsRings.forEach(r=>r.update());toRings.forEach(r=>r.update());

  // Update angle labels in 3D
  updateAngleLabels(currentFrame, pts);

  // Update gait phase leg coloring + cycle bar
  updateGaitPhases(currentFrame, pts);

  // Update angle plots window
  updateAngleWindow(currentFrame);
}

function resize(){const w=wrap.clientWidth,h=wrap.clientHeight;renderer.setSize(w,h);camera.aspect=w/h;camera.updateProjectionMatrix();}
new ResizeObserver(resize).observe(wrap);resize();

function animate(t){
  requestAnimationFrame(animate);
  if(playing){if(!lastTime)lastTime=t;accumulator+=(t-lastTime)*speed;lastTime=t;while(accumulator>=frameInterval){accumulator-=frameInterval;let n=currentFrame+1;if(n>=totalFrames)n=0;setFrame(n);}}else{lastTime=0;}
  controls.update();renderer.render(scene,camera);
}
setFrame(0);requestAnimationFrame(animate);

document.getElementById('btn-play').addEventListener('click',()=>{playing=!playing;document.getElementById('btn-play').textContent=playing?'Pause':'Play';lastTime=0;});
document.getElementById('btn-reset').addEventListener('click',()=>{setFrame(0);trackTgt.set(centroid[0],centroid[1],centroid[2]*0.5);camera.position.set(centroid[0]+camOff.x,centroid[1]+camOff.y,centroid[2]*0.5+camOff.z);controls.target.copy(trackTgt);});
document.getElementById('speed').addEventListener('input',e=>{speed=parseFloat(e.target.value);document.getElementById('speed-val').textContent=speed.toFixed(1)+'×';});
scrubber.addEventListener('input',()=>setFrame(Number(scrubber.value)));
window.addEventListener('keydown',e=>{
  if(e.code==='Space'){e.preventDefault();playing=!playing;document.getElementById('btn-play').textContent=playing?'Pause':'Play';lastTime=0;}
  else if(e.code==='ArrowRight'){e.preventDefault();playing=false;document.getElementById('btn-play').textContent='Play';setFrame(currentFrame+1);}
  else if(e.code==='ArrowLeft'){e.preventDefault();playing=false;document.getElementById('btn-play').textContent='Play';setFrame(currentFrame-1);}
});
</script>
</body>
