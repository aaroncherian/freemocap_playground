<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Gait Events — 3D Viewer</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=DM+Sans:wght@400;500;600&display=swap');

  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

  :root {
    --bg: #0a0a0f;
    --surface: #14141f;
    --border: #1e1e30;
    --text: #e0e0ec;
    --text-dim: #6a6a8a;
    --accent-hs: #ff6b4a;
    --accent-to: #4adfff;
    --accent-bone: #c8c8e0;
    --accent-joint: #9090b8;
    --ground: #1a1a2a;
  }

  html,body { height:100%; overflow:hidden; background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; }

  #app {
    display:grid;
    grid-template-rows: auto 1fr auto;
    height:100%;
  }

  /* Loading overlay */
  #loading {
    position:fixed; inset:0; z-index:100;
    display:flex; align-items:center; justify-content:center; flex-direction:column; gap:12px;
    background:var(--bg);
    font-family:'JetBrains Mono',monospace; font-size:14px; color:var(--text-dim);
  }
  #loading .spinner {
    width:32px; height:32px; border:3px solid var(--border);
    border-top-color:var(--accent-hs); border-radius:50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform:rotate(360deg); } }
  #loading.hidden { display:none; }

  header {
    padding: 16px 24px 12px;
    display:flex; align-items:baseline; gap:16px;
    border-bottom:1px solid var(--border);
    background: var(--surface);
  }
  header h1 {
    font-family:'JetBrains Mono',monospace;
    font-size:15px; font-weight:500; letter-spacing:0.04em;
    text-transform:uppercase;
    color:var(--text);
  }
  header .subtitle {
    font-size:12px; color:var(--text-dim); font-weight:400;
  }

  #canvas-wrap { position:relative; overflow:hidden; }
  canvas { display:block; width:100%; height:100%; }

  .event-toast {
    position:absolute; top:20px; right:20px;
    padding: 10px 20px;
    border-radius:6px;
    font-family:'JetBrains Mono',monospace;
    font-size:14px; font-weight:600;
    letter-spacing:0.06em;
    text-transform:uppercase;
    pointer-events:none;
    opacity:0;
    transform:translateY(-8px);
    transition: opacity 0.15s ease, transform 0.15s ease;
  }
  .event-toast.show { opacity:1; transform:translateY(0); }
  .event-toast.hs {
    background: rgba(255,107,74,0.15);
    border:1px solid rgba(255,107,74,0.5);
    color:var(--accent-hs);
  }
  .event-toast.to {
    background: rgba(74,223,255,0.15);
    border:1px solid rgba(74,223,255,0.5);
    color:var(--accent-to);
  }

  .phase-bar {
    position:absolute; bottom:0; left:0; right:0; height:4px;
    transition: background 0.2s ease;
  }
  .phase-bar.stance { background: linear-gradient(90deg, var(--accent-hs), rgba(255,107,74,0.3)); }
  .phase-bar.swing  { background: linear-gradient(90deg, var(--accent-to), rgba(74,223,255,0.3)); }

  .legend {
    position:absolute; bottom:16px; left:16px;
    display:flex; flex-direction:column; gap:6px;
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
  }
  .legend-item { display:flex; align-items:center; gap:8px; }
  .legend-dot { width:10px; height:10px; border-radius:50%; }
  .legend-dot.hs { background:var(--accent-hs); box-shadow: 0 0 8px var(--accent-hs); }
  .legend-dot.to { background:var(--accent-to); box-shadow: 0 0 8px var(--accent-to); }

  .cycle-info {
    position:absolute; top:20px; left:20px;
    font-family:'JetBrains Mono',monospace;
    font-size:12px; color:var(--text-dim);
    line-height:1.6;
  }
  .cycle-info .val { color:var(--text); font-weight:500; }

  footer {
    padding:10px 24px;
    display:flex; align-items:center; gap:16px;
    border-top:1px solid var(--border);
    background:var(--surface);
    flex-wrap: wrap;
  }

  footer button {
    background:none; border:1px solid var(--border); color:var(--text);
    padding:6px 16px; border-radius:4px; cursor:pointer;
    font-family:'JetBrains Mono',monospace; font-size:12px;
    transition: border-color 0.2s, background 0.2s;
  }
  footer button:hover { border-color:var(--text-dim); background:rgba(255,255,255,0.03); }

  .speed-control {
    display:flex; align-items:center; gap:8px;
    font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--text-dim);
  }
  .speed-control input[type=range] { width:100px; accent-color:var(--accent-hs); }

  .scrubber {
    flex: 1; min-width:200px;
    display:flex; align-items:center; gap:8px;
  }
  .scrubber input[type=range] {
    flex:1; accent-color: var(--accent-bone);
  }

  .frame-display {
    font-family:'JetBrains Mono',monospace;
    font-size:12px; color:var(--text-dim);
  }
  .frame-display .val { color:var(--text); }
</style>
</head>
<body>
<div id="loading">
  <div class="spinner"></div>
  <div>Loading skeleton data &amp; detecting gait events...</div>
</div>

<div id="app">
  <header>
    <h1>Gait Events</h1>
    <span class="subtitle" id="subtitle">Loading...</span>
  </header>

  <div id="canvas-wrap">
    <canvas id="c"></canvas>
    <div class="event-toast hs" id="toast-hs">⬇ Heel Strike</div>
    <div class="event-toast to" id="toast-to">⬆ Toe Off</div>
    <div class="phase-bar" id="phase-bar"></div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot hs"></div><span style="color:var(--accent-hs)">Heel Strike</span></div>
      <div class="legend-item"><div class="legend-dot to"></div><span style="color:var(--accent-to)">Toe Off</span></div>
    </div>
    <div class="cycle-info" id="cycle-info"></div>
  </div>

  <footer>
    <button id="btn-play">Pause</button>
    <button id="btn-reset">Reset</button>
    <div class="speed-control">
      <span>Speed</span>
      <input type="range" id="speed" min="0.1" max="2" step="0.1" value="0.6"/>
      <span id="speed-val">0.6×</span>
    </div>
    <div class="scrubber">
      <input type="range" id="scrubber" min="0" max="0" step="1" value="0"/>
    </div>
    <div class="frame-display">
      Frame <span class="val" id="frame-num">0</span> / <span id="frame-total">0</span>
    </div>
  </footer>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ─── Load Data from Server ───────────────────────────────────────
const loadingEl = document.getElementById('loading');

let data;
try {
  const resp = await fetch('/gait_data.json');
  if (!resp.ok) throw new Error(`HTTP ${resp.status}: ${resp.statusText}`);
  data = await resp.json();
} catch (err) {
  loadingEl.innerHTML = `
    <div style="color:var(--accent-hs); font-size:16px;">Failed to load data</div>
    <div>${err.message}</div>
    <div style="margin-top:12px; font-size:12px; color:var(--text-dim);">
      Make sure gait_events_server.py is running.
    </div>
  `;
  throw err;
}

const {
  positions,
  connections: rawConnections,
  landmarks,
  gait_events: gaitEvents,
  landmark_indices: landmarkIndices,
  fps,
  tracker,
  color: skeletonColor,
} = data;

const totalFrames = positions.length;
const numMarkers = positions[0].length;
const heelStrikes = gaitEvents.heel_strikes || [];
const toeOffs = gaitEvents.toe_offs || [];

// Build name→index map
const nameToIdx = new Map();
landmarks.forEach((name, idx) => nameToIdx.set(name, idx));

// Normalize connections from [name, name] to [idx, idx]
const connections = [];
if (Array.isArray(rawConnections)) {
  rawConnections.forEach(conn => {
    let a, b;
    if (Array.isArray(conn)) {
      [a, b] = conn;
    } else if (conn && typeof conn === 'object' && conn.proximal && conn.distal) {
      a = conn.proximal; b = conn.distal;
    } else return;

    const ia = typeof a === 'number' ? a : nameToIdx.get(a);
    const ib = typeof b === 'number' ? b : nameToIdx.get(b);
    if (ia != null && ib != null) connections.push([ia, ib]);
  });
}

// Update UI
document.getElementById('subtitle').textContent =
  `${tracker} — ${totalFrames} frames @ ${fps} Hz — ${heelStrikes.length} HS, ${toeOffs.length} TO detected`;
document.getElementById('frame-total').textContent = totalFrames - 1;

const scrubber = document.getElementById('scrubber');
scrubber.max = String(totalFrames - 1);

loadingEl.classList.add('hidden');

console.log(`Loaded: ${tracker}, ${totalFrames} frames, ${numMarkers} markers`);
console.log(`Gait events: ${heelStrikes.length} heel strikes, ${toeOffs.length} toe offs`);
console.log(`Connections: ${connections.length}`);

// ─── Scene Setup ──────────────────────────────────────────────────
const canvas = document.getElementById('c');
const wrap = document.getElementById('canvas-wrap');

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a0f);
scene.fog = new THREE.FogExp2(0x0a0a0f, 0.00015);

const camera = new THREE.PerspectiveCamera(40, 1, 1, 50000);
camera.up.set(0, 0, 1);

const controls = new OrbitControls(camera, canvas);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 500;
controls.maxDistance = 8000;

// ─── Lighting ─────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x303050, 0.8));

const keyLight = new THREE.DirectionalLight(0xffeedd, 1.5);
keyLight.position.set(1000, -2000, 3000);
keyLight.castShadow = true;
keyLight.shadow.mapSize.set(1024, 1024);
keyLight.shadow.camera.near = 100;
keyLight.shadow.camera.far = 8000;
[-2000, 2000, 2000, -2000].forEach((v, i) => {
  ['left','right','top','bottom'][i].split().forEach(prop =>
    keyLight.shadow.camera[['left','right','top','bottom'][i]] = v);
});
scene.add(keyLight);
scene.add(new THREE.DirectionalLight(0x6688cc, 0.4).translateX(-1500).translateY(1000).translateZ(1000));

// ─── Ground Plane ─────────────────────────────────────────────────
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(10000, 10000),
  new THREE.MeshStandardMaterial({ color: 0x0e0e18, roughness: 0.95 })
);
ground.receiveShadow = true;
scene.add(ground);

const grid = new THREE.GridHelper(6000, 30, 0x1a1a2e, 0x1a1a2e);
grid.rotation.x = Math.PI / 2;
grid.position.z = 0.5;
scene.add(grid);

// ─── Auto-detect coordinate system ───────────────────────────────
// Figure out which axis is "up" and set initial camera accordingly.
// Check the first frame's vertical extent.
const frame0 = positions[0];
let minZ = Infinity, maxZ = -Infinity, minY = Infinity, maxY = -Infinity;
let sumX = 0, sumY = 0, sumZ = 0;
frame0.forEach(([x, y, z]) => {
  if (z < minZ) minZ = z;
  if (z > maxZ) maxZ = z;
  if (y < minY) minY = y;
  if (y > maxY) maxY = y;
  sumX += x; sumY += y; sumZ += z;
});
const centroid = [sumX / numMarkers, sumY / numMarkers, sumZ / numMarkers];
const zSpan = maxZ - minZ;
const bodyHeight = zSpan; // assumes Z-up

console.log(`Body height (Z span): ${bodyHeight.toFixed(0)} mm, centroid: [${centroid.map(v=>v.toFixed(0)).join(', ')}]`);

// ─── Skeleton Meshes ──────────────────────────────────────────────
const jointRadius = Math.max(8, bodyHeight * 0.008);
const jointGeo = new THREE.SphereGeometry(jointRadius, 12, 8);
const color = typeof skeletonColor === 'number' ? skeletonColor : 0x2f6efc;
const jointMat = new THREE.MeshStandardMaterial({
  color: 0x9090b8,
  emissive: color,
  emissiveIntensity: 0.25,
  roughness: 0.4,
  metalness: 0.3,
});

const jointMesh = new THREE.InstancedMesh(jointGeo, jointMat, numMarkers);
jointMesh.castShadow = true;
jointMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
scene.add(jointMesh);

// Bones
let lineSegments = null;
if (connections.length > 0) {
  const linePos = new Float32Array(connections.length * 2 * 3);
  const lineGeo = new THREE.BufferGeometry();
  lineGeo.setAttribute('position', new THREE.BufferAttribute(linePos, 3));
  const lineMat = new THREE.LineBasicMaterial({ color: 0xc8c8e0, transparent: true, opacity: 0.7 });
  lineSegments = new THREE.LineSegments(lineGeo, lineMat);
  scene.add(lineSegments);
}

// ─── Gait Event Ring Indicators ──────────────────────────────────
class GaitEventRing {
  constructor(hexColor, maxRadius = 120) {
    this.maxRadius = maxRadius;
    this.life = 0;
    this.maxLife = 10;

    const geo = new THREE.RingGeometry(0.8, 1.0, 32);
    const mat = new THREE.MeshBasicMaterial({ color: hexColor, transparent: true, opacity: 0.9, side: THREE.DoubleSide });
    this.mesh = new THREE.Mesh(geo, mat);
    this.mesh.visible = false;
    scene.add(this.mesh);

    const beamGeo = new THREE.CylinderGeometry(2, 2, 1, 8);
    const beamMat = new THREE.MeshBasicMaterial({ color: hexColor, transparent: true, opacity: 0.4 });
    this.beam = new THREE.Mesh(beamGeo, beamMat);
    this.beam.visible = false;
    scene.add(this.beam);
  }

  trigger(x, y, z) {
    this.mesh.position.set(x, y, 1);
    this.mesh.visible = true;
    this.life = this.maxLife;
    this.beam.position.set(x, y, z / 2);
    this.beam.scale.set(1, Math.max(z, 1), 1);
    this.beam.rotation.x = Math.PI / 2;
    this.beam.visible = true;
  }

  update() {
    if (this.life <= 0) { this.mesh.visible = false; this.beam.visible = false; return; }
    this.life--;
    const t = 1 - (this.life / this.maxLife);
    const ease = 1 - Math.pow(1 - t, 3);
    const scale = this.maxRadius * ease;
    this.mesh.scale.set(scale, scale, 1);
    this.mesh.material.opacity = (1 - t) * 0.9;
    this.beam.material.opacity = (1 - t) * 0.3;
  }
}

const hsRings = Array.from({length: 6}, () => new GaitEventRing(0xff6b4a, bodyHeight * 0.08));
const toRings = Array.from({length: 6}, () => new GaitEventRing(0x4adfff, bodyHeight * 0.06));
let hsRingIdx = 0, toRingIdx = 0;

// ─── Event Lookup ─────────────────────────────────────────────────
const hsFrameMap = new Map();
heelStrikes.forEach(e => hsFrameMap.set(e.frame, e));
const toFrameMap = new Map();
toeOffs.forEach(e => toFrameMap.set(e.frame, e));

// Key landmark indices
const lHeelIdx = landmarkIndices.left_heel;
const rHeelIdx = landmarkIndices.right_heel;
const lToeIdx = landmarkIndices.left_toe;
const rToeIdx = landmarkIndices.right_toe;

// Find a "pelvis" marker for camera tracking — use centroid of first few markers as fallback
function findPelvisIdx() {
  for (const name of ['pelvis_center', 'mid_hip', 'hips_center', 'sacrum', 'pelvis']) {
    if (nameToIdx.has(name)) return nameToIdx.get(name);
  }
  // Fallback: use the marker closest to centroid in frame 0
  let bestIdx = 0, bestDist = Infinity;
  frame0.forEach(([x,y,z], i) => {
    const d = Math.hypot(x - centroid[0], y - centroid[1], z - centroid[2]);
    if (d < bestDist) { bestDist = d; bestIdx = i; }
  });
  return bestIdx;
}
const pelvisIdx = findPelvisIdx();

// ─── State ────────────────────────────────────────────────────────
let currentFrame = 0;
let playing = true;
let speed = 0.6;
let lastTime = 0;
let accumulator = 0;
const frameInterval = 1000 / fps;

const toastHS = document.getElementById('toast-hs');
const toastTO = document.getElementById('toast-to');
const phaseBar = document.getElementById('phase-bar');
const cycleInfo = document.getElementById('cycle-info');
let toastHSTimer = 0, toastTOTimer = 0;

// ─── Camera ──────────────────────────────────────────────────────
const camDist = bodyHeight * 2.5;
const cameraOffset = new THREE.Vector3(camDist * 0.8, -camDist * 0.6, bodyHeight * 0.6);
const trackTarget = new THREE.Vector3(centroid[0], centroid[1], centroid[2] * 0.5);

camera.position.set(
  centroid[0] + cameraOffset.x,
  centroid[1] + cameraOffset.y,
  centroid[2] * 0.5 + cameraOffset.z
);
controls.target.copy(trackTarget);

function updateCamera(pelvis) {
  const target = new THREE.Vector3(pelvis[0], pelvis[1], pelvis[2] * 0.5);
  trackTarget.lerp(target, 0.03);
  controls.target.copy(trackTarget);
  const desired = trackTarget.clone().add(cameraOffset);
  camera.position.lerp(desired, 0.02);
}

// ─── Frame Update ─────────────────────────────────────────────────
const tmpMat = new THREE.Matrix4();

function setFrame(k) {
  currentFrame = Math.max(0, Math.min(totalFrames - 1, k));
  const pts = positions[currentFrame];

  // Update joint instances
  for (let i = 0; i < numMarkers; i++) {
    const [x, y, z] = pts[i];
    // Skip NaN markers
    if (isNaN(x) || isNaN(y) || isNaN(z)) {
      tmpMat.makeScale(0, 0, 0);
    } else {
      tmpMat.makeTranslation(x, y, z);
    }
    jointMesh.setMatrixAt(i, tmpMat);
  }
  jointMesh.instanceMatrix.needsUpdate = true;

  // Update bones
  if (lineSegments) {
    const arr = lineSegments.geometry.attributes.position.array;
    let off = 0;
    connections.forEach(([a, b]) => {
      const pa = pts[a], pb = pts[b];
      if (pa && pb && !isNaN(pa[0]) && !isNaN(pb[0])) {
        arr[off++] = pa[0]; arr[off++] = pa[1]; arr[off++] = pa[2];
        arr[off++] = pb[0]; arr[off++] = pb[1]; arr[off++] = pb[2];
      } else {
        for (let n = 0; n < 6; n++) arr[off++] = NaN;
      }
    });
    lineSegments.geometry.attributes.position.needsUpdate = true;
  }

  // Camera
  updateCamera(pts[pelvisIdx]);

  // Light follows
  keyLight.position.set(pts[pelvisIdx][0] + 1000, pts[pelvisIdx][1] - 2000, 3000);

  // ─── Gait Events ───────────────────────────────────────────
  const hsEvent = hsFrameMap.get(currentFrame);
  if (hsEvent) {
    const idx = hsEvent.side === 'left' ? lHeelIdx : rHeelIdx;
    if (idx != null) {
      const pos = pts[idx];
      const ring = hsRings[hsRingIdx % hsRings.length];
      ring.trigger(pos[0], pos[1], pos[2]);
      hsRingIdx++;
    }
    toastHS.textContent = `⬇ Heel Strike (${hsEvent.side})`;
    toastHS.classList.add('show');
    clearTimeout(toastHSTimer);
    toastHSTimer = setTimeout(() => toastHS.classList.remove('show'), 500);
  }

  const toEvent = toFrameMap.get(currentFrame);
  if (toEvent) {
    const idx = toEvent.side === 'left' ? lToeIdx : rToeIdx;
    if (idx != null) {
      const pos = pts[idx];
      const ring = toRings[toRingIdx % toRings.length];
      ring.trigger(pos[0], pos[1], pos[2]);
      toRingIdx++;
    }
    toastTO.textContent = `⬆ Toe Off (${toEvent.side})`;
    toastTO.classList.add('show');
    clearTimeout(toastTOTimer);
    toastTOTimer = setTimeout(() => toastTO.classList.remove('show'), 500);
  }

  // Phase: stance or swing for right foot
  let lastRHS = -1, lastRTO = -1;
  for (const e of heelStrikes) { if (e.side === 'right' && e.frame <= currentFrame) lastRHS = e.frame; }
  for (const e of toeOffs) { if (e.side === 'right' && e.frame <= currentFrame) lastRTO = e.frame; }
  const inStance = lastRHS >= 0 && lastRHS >= lastRTO;
  phaseBar.className = `phase-bar ${inStance ? 'stance' : 'swing'}`;

  cycleInfo.innerHTML = `
    <div>Phase: <span class="val">${inStance ? 'Stance' : 'Swing'}</span> (R)</div>
    <div>Events: <span class="val">${heelStrikes.length}</span> HS, <span class="val">${toeOffs.length}</span> TO</div>
    <div>Tracker: <span class="val">${tracker}</span></div>
  `;

  document.getElementById('frame-num').textContent = currentFrame;
  scrubber.value = String(currentFrame);

  // Update rings
  hsRings.forEach(r => r.update());
  toRings.forEach(r => r.update());
}

// ─── Resize ───────────────────────────────────────────────────────
function resize() {
  const w = wrap.clientWidth;
  const h = wrap.clientHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
new ResizeObserver(resize).observe(wrap);
resize();

// ─── Animation Loop ──────────────────────────────────────────────
function animate(t) {
  requestAnimationFrame(animate);

  if (playing) {
    if (!lastTime) lastTime = t;
    accumulator += (t - lastTime) * speed;
    lastTime = t;

    while (accumulator >= frameInterval) {
      accumulator -= frameInterval;
      let next = currentFrame + 1;
      if (next >= totalFrames) next = 0;
      setFrame(next);
    }
  } else {
    lastTime = 0;
  }

  controls.update();
  renderer.render(scene, camera);
}

setFrame(0);
requestAnimationFrame(animate);

// ─── Controls ─────────────────────────────────────────────────────
document.getElementById('btn-play').addEventListener('click', () => {
  playing = !playing;
  document.getElementById('btn-play').textContent = playing ? 'Pause' : 'Play';
  lastTime = 0;
});

document.getElementById('btn-reset').addEventListener('click', () => {
  setFrame(0);
  trackTarget.set(centroid[0], centroid[1], centroid[2] * 0.5);
  camera.position.set(
    centroid[0] + cameraOffset.x,
    centroid[1] + cameraOffset.y,
    centroid[2] * 0.5 + cameraOffset.z
  );
  controls.target.copy(trackTarget);
});

const speedSlider = document.getElementById('speed');
const speedVal = document.getElementById('speed-val');
speedSlider.addEventListener('input', () => {
  speed = parseFloat(speedSlider.value);
  speedVal.textContent = speed.toFixed(1) + '×';
});

scrubber.addEventListener('input', () => {
  setFrame(Number(scrubber.value));
});

// Keyboard: space = play/pause, arrow keys = step
window.addEventListener('keydown', e => {
  if (e.code === 'Space') {
    e.preventDefault();
    playing = !playing;
    document.getElementById('btn-play').textContent = playing ? 'Pause' : 'Play';
    lastTime = 0;
  } else if (e.code === 'ArrowRight') {
    e.preventDefault();
    playing = false;
    document.getElementById('btn-play').textContent = 'Play';
    setFrame(currentFrame + 1);
  } else if (e.code === 'ArrowLeft') {
    e.preventDefault();
    playing = false;
    document.getElementById('btn-play').textContent = 'Play';
    setFrame(currentFrame - 1);
  }
});

</script>
</body>
</html>
