<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Multi-Skeleton Comparison</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<script src="https://cdn.plot.ly/plotly-2.33.0.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=IBM+Plex+Mono:wght@300;400;500&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

  :root {
    --bg: #f4efe8;
    --surface: #ebe5db;
    --surface-hover: #e2dbd0;
    --border: #d4cbbf;
    --text: #3a3028;
    --text-dim: #8a7e70;
    --ui-accent: #c0623a;
    --bone: #5c4a3a;
    --joint: #6b5847;
  }

  html, body {
    height: 100%; overflow: hidden;
    background: var(--bg); color: var(--text);
    font-family: 'Crimson Pro', Georgia, serif;
  }

  #app { display: grid; grid-template-rows: auto 1fr auto auto; height: 100%; }

  /* ── Loading ── */
  #loading {
    position: fixed; inset: 0; z-index: 100;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 14px;
    background: var(--bg); font-size: 15px; color: var(--text-dim);
  }
  #loading .spinner { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--ui-accent); border-radius: 50%; animation: spin 0.9s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading.hidden { display: none; }

  /* ── Header ── */
  header {
    padding: 12px 28px 8px;
    display: flex; align-items: baseline; gap: 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  header h1 { font-size: 18px; font-weight: 500; letter-spacing: 0.02em; }
  header .subtitle { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text-dim); }

  /* ── Canvas ── */
  #canvas-wrap { position: relative; overflow: hidden; min-height: 0; }
  canvas { display: block; width: 100%; height: 100%; }

  /* ── Tracker labels overlay ── */
  .tracker-label {
    position: absolute; top: 14px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px; font-weight: 500;
    letter-spacing: 0.04em;
    padding: 3px 10px; border-radius: 3px;
    pointer-events: none;
    background: rgba(244, 239, 232, 0.85);
    border: 1px solid var(--border);
  }

  /* ── Trajectory panel ── */
  #trajectory-panel {
    border-top: 1px solid var(--border);
    background: var(--bg);
    overflow: hidden;
  }
  #trajectory-controls {
    display: flex; align-items: center; gap: 12px;
    padding: 6px 28px;
    font-family: 'IBM Plex Mono', monospace; font-size: 11px;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-wrap: wrap;
  }
  #trajectory-controls select, #trajectory-controls input {
    font-family: inherit; font-size: 11px;
    padding: 2px 6px; border: 1px solid var(--border);
    border-radius: 3px; background: var(--bg); color: var(--text);
  }
  #trajectory-plots {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 4px; padding: 4px 12px 8px;
    height: 200px;
  }
  #trajectory-plots .plot { min-width: 0; height: 100%; }

  /* ── Legend overlay ── */
  .tracker-legend {
    position: absolute; bottom: 16px; left: 18px;
    display: flex; flex-direction: column; gap: 5px;
    font-family: 'IBM Plex Mono', monospace; font-size: 11px;
    background: rgba(244, 239, 232, 0.85);
    padding: 8px 12px; border-radius: 4px;
    border: 1px solid var(--border);
  }
  .legend-item { display: flex; align-items: center; gap: 7px; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

  /* ── Footer ── */
  footer {
    padding: 10px 28px;
    display: flex; align-items: center; gap: 16px;
    border-top: 1px solid var(--border);
    background: var(--surface); flex-wrap: wrap;
  }
  footer button { background: none; border: 1px solid var(--border); color: var(--text); padding: 5px 14px; border-radius: 3px; cursor: pointer; font-family: 'IBM Plex Mono', monospace; font-size: 11px; transition: border-color 0.2s, background 0.2s; }
  footer button:hover { border-color: var(--text-dim); background: var(--surface-hover); }
  .speed-control { display: flex; align-items: center; gap: 8px; font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text-dim); }
  .speed-control input[type=range] { width: 90px; accent-color: var(--bone); }
  .scrubber { flex: 1; min-width: 180px; display: flex; align-items: center; gap: 8px; }
  .scrubber input[type=range] { flex: 1; accent-color: var(--bone); }
  .frame-display { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text-dim); }
  .frame-display .val { color: var(--text); font-weight: 500; }
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div><div>Loading …</div></div>

<div id="app">
  <header>
    <h1>Multi-Skeleton Comparison</h1>
    <span class="subtitle" id="subtitle">Loading …</span>
  </header>

  <div id="canvas-wrap">
    <canvas id="c"></canvas>
    <div class="tracker-legend" id="tracker-legend"></div>
  </div>

  <div id="trajectory-panel">
    <div id="trajectory-controls">
      <label>Landmark: <select id="traj-landmark"></select></label>
      <label>Window: <input type="number" id="traj-window" value="300" min="50" max="5000" step="50" style="width:60px"/> frames</label>
    </div>
    <div id="trajectory-plots">
      <div id="tplot-x" class="plot"></div>
      <div id="tplot-y" class="plot"></div>
      <div id="tplot-z" class="plot"></div>
    </div>
  </div>

  <footer>
    <button id="btn-play">Pause</button>
    <button id="btn-reset">Reset</button>
    <div class="speed-control">
      <span>Speed</span>
      <input type="range" id="speed" min="0.1" max="2" step="0.1" value="0.6"/>
      <span id="speed-val">0.6×</span>
    </div>
    <div class="scrubber">
      <input type="range" id="scrubber" min="0" max="0" step="1" value="0"/>
    </div>
    <div class="frame-display">
      Frame <span class="val" id="frame-num">0</span> / <span id="frame-total">0</span>
    </div>
  </footer>
</div>

<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/"
} }
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ═══════════════════════════════════════════════════════════════════
// LOAD DATA
// ═══════════════════════════════════════════════════════════════════
const loadingEl = document.getElementById('loading');
let data;
try {
  const r = await fetch('/skeleton_data.json');
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  data = await r.json();
} catch (err) {
  loadingEl.innerHTML = `<div style="color:var(--ui-accent)">${err.message}</div><div style="margin-top:8px;font-size:12px;color:var(--text-dim)">Make sure multi_skeleton_server.py is running.</div>`;
  throw err;
}

const { skeletons, fps, total_frames: totalFrames, common_landmarks: commonLandmarks, x_spacing: xSpacing } = data;

const trackerNames = skeletons.map(s => s.tracker);
document.getElementById('subtitle').textContent = `${trackerNames.join(' · ')}  ·  ${totalFrames} frames @ ${fps} Hz`;
document.getElementById('frame-total').textContent = totalFrames - 1;
const scrubber = document.getElementById('scrubber');
scrubber.max = String(totalFrames - 1);
loadingEl.classList.add('hidden');

// ═══════════════════════════════════════════════════════════════════
// THREE.JS SCENE
// ═══════════════════════════════════════════════════════════════════
const PAL = {
  bg: 0xf4efe8, ground: 0xe8e2d8, grid: 0xd6cfc4,
  fog: 0xf4efe8,
};

const canvas = document.getElementById('c');
const wrap = document.getElementById('canvas-wrap');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;

const scene = new THREE.Scene();
scene.background = new THREE.Color(PAL.bg);
scene.fog = new THREE.FogExp2(PAL.fog, 0.00005);

const camera = new THREE.PerspectiveCamera(40, 1, 1, 80000);
camera.up.set(0, 0, 1);
const controls = new OrbitControls(camera, canvas);
controls.enableDamping = true; controls.dampingFactor = 0.08;
controls.minDistance = 500; controls.maxDistance = 20000;

// Stop auto-tracking once the user touches the orbit controls
let userHasInteracted = false;
controls.addEventListener('start', () => { userHasInteracted = true; });

scene.add(new THREE.AmbientLight(0xfff8f0, 0.7));
const keyLight = new THREE.DirectionalLight(0xfff0e0, 1.2);
keyLight.position.set(1000, -2000, 3000);
keyLight.castShadow = true;
keyLight.shadow.mapSize.set(1024, 1024);
keyLight.shadow.camera.near = 100; keyLight.shadow.camera.far = 12000;
keyLight.shadow.camera.left = -5000; keyLight.shadow.camera.right = 5000;
keyLight.shadow.camera.top = 3000; keyLight.shadow.camera.bottom = -3000;
keyLight.shadow.bias = -0.001;
scene.add(keyLight);
scene.add(new THREE.DirectionalLight(0xe8ddd0, 0.35).translateX(-1500).translateY(1000).translateZ(800));
scene.add(new THREE.DirectionalLight(0xffe8d0, 0.25).translateY(2000).translateZ(500));

// Ground plane + grid — created here as placeholders, repositioned after centroid is known
const groundSize = 40000;
const groundMesh = new THREE.Mesh(
  new THREE.PlaneGeometry(groundSize, groundSize),
  new THREE.MeshStandardMaterial({ color: PAL.ground, roughness: 0.92 })
);
scene.add(groundMesh);
const grid = new THREE.GridHelper(groundSize, 60, PAL.grid, PAL.grid);
grid.rotation.x = Math.PI / 2; grid.position.z = 0.5;
grid.material.opacity = 0.4; grid.material.transparent = true;
scene.add(grid);

// ═══════════════════════════════════════════════════════════════════
// BUILD SKELETON MESHES
// ═══════════════════════════════════════════════════════════════════

// Pre-process each skeleton
const skeletonObjs = skeletons.map((skel, si) => {
  const positions = skel.positions; // [frames][landmarks][3]
  const landmarks = skel.landmarks;
  const numMarkers = landmarks.length;
  const colorHex = skel.color.hex;
  const colorCSS = skel.color.css;

  // Build name -> index map
  const nameToIdx = new Map();
  landmarks.forEach((n, i) => nameToIdx.set(n, i));

  // Resolve connections to indices
  const connections = [];
  (skel.connections || []).forEach(conn => {
    let a, b;
    if (Array.isArray(conn)) { [a, b] = conn; }
    else if (conn?.proximal && conn?.distal) { a = conn.proximal; b = conn.distal; }
    else return;
    const ia = typeof a === 'number' ? a : nameToIdx.get(a);
    const ib = typeof b === 'number' ? b : nameToIdx.get(b);
    if (ia != null && ib != null) connections.push([ia, ib]);
  });

  // Compute body height from frame 0
  const frame0 = positions[0];
  let minZ = Infinity, maxZ = -Infinity;
  frame0.forEach(([x, y, z]) => { minZ = Math.min(minZ, z); maxZ = Math.max(maxZ, z); });
  const bodyHeight = maxZ - minZ;

  // Joint spheres
  const jointRadius = Math.max(8, bodyHeight * 0.009);
  const jointMat = new THREE.MeshStandardMaterial({
    color: colorHex, emissive: colorHex, emissiveIntensity: 0.15,
    roughness: 0.6, metalness: 0.1
  });
  const jointMesh = new THREE.InstancedMesh(
    new THREE.SphereGeometry(jointRadius, 14, 10), jointMat, numMarkers
  );
  jointMesh.castShadow = true;
  jointMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
  scene.add(jointMesh);

  // Bone lines
  let lineSegments = null;
  if (connections.length > 0) {
    const lg = new THREE.BufferGeometry();
    lg.setAttribute('position', new THREE.BufferAttribute(new Float32Array(connections.length * 2 * 3), 3));
    lineSegments = new THREE.LineSegments(lg, new THREE.LineBasicMaterial({
      color: colorHex, transparent: true, opacity: 0.85
    }));
    scene.add(lineSegments);
  }

  // Find pelvis for camera tracking
  let pelvisIdx = 0;
  for (const n of ['pelvis_center', 'mid_hip', 'hips_center', 'sacrum', 'pelvis']) {
    if (nameToIdx.has(n)) { pelvisIdx = nameToIdx.get(n); break; }
  }

  return {
    tracker: skel.tracker,
    positions, landmarks, numMarkers, connections,
    jointMesh, lineSegments, bodyHeight,
    colorHex, colorCSS, nameToIdx, pelvisIdx,
  };
});

// ═══════════════════════════════════════════════════════════════════
// CAMERA SETUP — center on the middle of all skeletons
// ═══════════════════════════════════════════════════════════════════

// Compute overall centroid from all skeletons at frame 0
let globalCentroid = [0, 0, 0];
let totalPts = 0;
skeletonObjs.forEach(s => {
  const f0 = s.positions[0];
  f0.forEach(([x, y, z]) => {
    if (!isNaN(x)) { globalCentroid[0] += x; globalCentroid[1] += y; globalCentroid[2] += z; totalPts++; }
  });
});
globalCentroid = globalCentroid.map(v => v / totalPts);

const refBodyHeight = skeletonObjs[0].bodyHeight;
const camDist = refBodyHeight * 2.5 + xSpacing * (skeletons.length - 1) * 0.5;
const camOff = new THREE.Vector3(camDist * 0.3, -camDist * 0.9, refBodyHeight * 0.8);
const trackTgt = new THREE.Vector3(globalCentroid[0], globalCentroid[1], globalCentroid[2] * 0.5);

camera.position.set(globalCentroid[0] + camOff.x, globalCentroid[1] + camOff.y, globalCentroid[2] * 0.5 + camOff.z);
controls.target.copy(trackTgt);

// Center ground plane + grid on the skeleton group
groundMesh.position.set(globalCentroid[0], globalCentroid[1], 0);
grid.position.set(globalCentroid[0], globalCentroid[1], 0.5);

// ═══════════════════════════════════════════════════════════════════
// TRACKER LEGEND
// ═══════════════════════════════════════════════════════════════════
const legendEl = document.getElementById('tracker-legend');
skeletonObjs.forEach(s => {
  const item = document.createElement('div');
  item.className = 'legend-item';
  item.innerHTML = `<div class="legend-dot" style="background:${s.colorCSS}"></div><span style="color:${s.colorCSS}">${s.tracker}</span>`;
  legendEl.appendChild(item);
});

// ═══════════════════════════════════════════════════════════════════
// TRAJECTORY PLOTS
// ═══════════════════════════════════════════════════════════════════

const INTERESTING_LANDMARKS = [
  'left_knee', 'right_knee', 'left_ankle', 'right_ankle',
  'left_hip', 'right_hip', 'left_heel', 'right_heel',
  'left_foot_index', 'right_foot_index',
  'left_shoulder', 'right_shoulder',
  'left_wrist', 'right_wrist',
  'nose', 'pelvis_center', 'mid_hip',
];

const trajLandmarkSelect = document.getElementById('traj-landmark');
// Populate with common landmarks, prioritizing interesting ones first
const sortedLandmarks = [...commonLandmarks].sort((a, b) => {
  const ai = INTERESTING_LANDMARKS.indexOf(a);
  const bi = INTERESTING_LANDMARKS.indexOf(b);
  if (ai >= 0 && bi >= 0) return ai - bi;
  if (ai >= 0) return -1;
  if (bi >= 0) return 1;
  return a.localeCompare(b);
});

sortedLandmarks.forEach(name => {
  const opt = document.createElement('option');
  opt.value = name;
  opt.textContent = name.replace(/_/g, ' ');
  trajLandmarkSelect.appendChild(opt);
});

let activeLandmark = sortedLandmarks[0] || '';
let trajWindowHalf = 150;

// Pre-extract raw (un-offset) positions for trajectory plots
// We want to show the ORIGINAL coordinates, not the offset ones
const rawPositions = skeletons.map(skel => {
  const xOff = skel.x_offset;
  return skel.positions.map(frame =>
    frame.map(([x, y, z]) => [x - xOff, y, z])
  );
});

function drawTrajectoryPlots() {
  const landmark = activeLandmark;
  if (!landmark) return;

  const axes = ['X', 'Y', 'Z'];
  const plotIds = ['tplot-x', 'tplot-y', 'tplot-z'];
  const frameArr = Array.from({ length: totalFrames }, (_, k) => k);

  axes.forEach((axis, ai) => {
    const div = document.getElementById(plotIds[ai]);
    const traces = [];

    skeletonObjs.forEach((skel, si) => {
      const idx = skel.nameToIdx.get(landmark);
      if (idx == null) return;

      const raw = rawPositions[si];
      const yData = raw.map(frame => {
        const pt = frame[idx];
        return (pt && !isNaN(pt[ai])) ? pt[ai] : null;
      });

      traces.push({
        x: frameArr,
        y: yData,
        name: skel.tracker,
        mode: 'lines',
        line: { width: 1.5, color: skel.colorCSS },
        hovertemplate: `%{y:.1f} mm<br>frame %{x}<extra>${skel.tracker}</extra>`,
      });
    });

    const layout = {
      margin: { l: 48, r: 8, t: 24, b: 24 },
      title: { text: `${landmark.replace(/_/g, ' ')} — ${axis} (mm)`, font: { family: 'IBM Plex Mono', size: 11, color: '#8a7e70' } },
      xaxis: { title: '', showgrid: false, range: [0, trajWindowHalf * 2] },
      yaxis: { title: 'mm', automargin: true, showgrid: true, gridcolor: '#e2dbd0', zeroline: true, zerolinecolor: '#d4cbbf' },
      showlegend: ai === 0,
      legend: { orientation: 'h', x: 1, y: 1.15, xanchor: 'right', font: { family: 'IBM Plex Mono', size: 10 } },
      paper_bgcolor: 'rgba(0,0,0,0)', plot_bgcolor: 'rgba(0,0,0,0)',
      shapes: [{ type: 'line', xref: 'paper', yref: 'paper', x0: 0.5, x1: 0.5, y0: 0, y1: 1, line: { color: '#5c4a3a', width: 2, dash: 'solid' } }],
    };

    Plotly.newPlot(div, traces, layout, { responsive: true, displaylogo: false, modeBarButtonsToRemove: ['select2d', 'lasso2d'] });
  });
}

trajLandmarkSelect.addEventListener('change', () => {
  activeLandmark = trajLandmarkSelect.value;
  drawTrajectoryPlots();
});

document.getElementById('traj-window').addEventListener('change', e => {
  trajWindowHalf = Math.max(25, parseInt(e.target.value) / 2);
  drawTrajectoryPlots();
});

drawTrajectoryPlots();

function updateTrajectoryWindow(frame) {
  const range = [frame - trajWindowHalf, frame + trajWindowHalf];
  ['tplot-x', 'tplot-y', 'tplot-z'].forEach(id => {
    const div = document.getElementById(id);
    Plotly.relayout(div, { 'xaxis.range': range });
  });
}

// ═══════════════════════════════════════════════════════════════════
// ANIMATION
// ═══════════════════════════════════════════════════════════════════

const tmp = new THREE.Matrix4();
let currentFrame = 0, playing = true, speed = 0.6, lastTime = 0, accumulator = 0;
const frameInterval = 1000 / fps;

function setFrame(k) {
  currentFrame = Math.max(0, Math.min(totalFrames - 1, k));

  skeletonObjs.forEach(skel => {
    const pts = skel.positions[currentFrame];

    // Update joint positions
    for (let i = 0; i < skel.numMarkers; i++) {
      const [x, y, z] = pts[i];
      if (isNaN(x) || isNaN(y) || isNaN(z)) tmp.makeScale(0, 0, 0);
      else tmp.makeTranslation(x, y, z);
      skel.jointMesh.setMatrixAt(i, tmp);
    }
    skel.jointMesh.instanceMatrix.needsUpdate = true;

    // Update bone lines
    if (skel.lineSegments) {
      const a = skel.lineSegments.geometry.attributes.position.array;
      let o = 0;
      skel.connections.forEach(([ai, bi]) => {
        const pa = pts[ai], pb = pts[bi];
        if (pa && pb && !isNaN(pa[0]) && !isNaN(pb[0])) {
          a[o++] = pa[0]; a[o++] = pa[1]; a[o++] = pa[2];
          a[o++] = pb[0]; a[o++] = pb[1]; a[o++] = pb[2];
        } else {
          for (let n = 0; n < 6; n++) a[o++] = NaN;
        }
      });
      skel.lineSegments.geometry.attributes.position.needsUpdate = true;
    }
  });

  // Compute midpoint of all pelvis positions (used for light + optional camera tracking)
  const midPelvis = [0, 0, 0];
  let count = 0;
  skeletonObjs.forEach(skel => {
    const p = skel.positions[currentFrame][skel.pelvisIdx];
    if (p && !isNaN(p[0])) {
      midPelvis[0] += p[0]; midPelvis[1] += p[1]; midPelvis[2] += p[2];
      count++;
    }
  });
  if (count > 0) {
    midPelvis[0] /= count; midPelvis[1] /= count; midPelvis[2] /= count;
  }

  // Camera: only update orbit target if user hasn't grabbed the controls
  if (!userHasInteracted && count > 0) {
    trackTgt.lerp(new THREE.Vector3(midPelvis[0], midPelvis[1], midPelvis[2] * 0.5), 0.03);
    controls.target.copy(trackTgt);
  }

  // Light follows
  keyLight.position.set(midPelvis[0] + 1000, midPelvis[1] - 2000, 3000);

  document.getElementById('frame-num').textContent = currentFrame;
  scrubber.value = String(currentFrame);

  updateTrajectoryWindow(currentFrame);
}

function resize() {
  const w = wrap.clientWidth, h = wrap.clientHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
new ResizeObserver(resize).observe(wrap);
resize();

function animate(t) {
  requestAnimationFrame(animate);
  if (playing) {
    if (!lastTime) lastTime = t;
    accumulator += (t - lastTime) * speed;
    lastTime = t;
    while (accumulator >= frameInterval) {
      accumulator -= frameInterval;
      let n = currentFrame + 1;
      if (n >= totalFrames) n = 0;
      setFrame(n);
    }
  } else {
    lastTime = 0;
  }
  controls.update();
  renderer.render(scene, camera);
}

setFrame(0);
requestAnimationFrame(animate);

// ═══════════════════════════════════════════════════════════════════
// CONTROLS
// ═══════════════════════════════════════════════════════════════════

document.getElementById('btn-play').addEventListener('click', () => {
  playing = !playing;
  document.getElementById('btn-play').textContent = playing ? 'Pause' : 'Play';
  lastTime = 0;
});

document.getElementById('btn-reset').addEventListener('click', () => {
  setFrame(0);
  userHasInteracted = false;
  trackTgt.set(globalCentroid[0], globalCentroid[1], globalCentroid[2] * 0.5);
  camera.position.set(globalCentroid[0] + camOff.x, globalCentroid[1] + camOff.y, globalCentroid[2] * 0.5 + camOff.z);
  controls.target.copy(trackTgt);
});

document.getElementById('speed').addEventListener('input', e => {
  speed = parseFloat(e.target.value);
  document.getElementById('speed-val').textContent = speed.toFixed(1) + '×';
});

scrubber.addEventListener('input', () => setFrame(Number(scrubber.value)));

window.addEventListener('keydown', e => {
  if (e.code === 'Space') {
    e.preventDefault();
    playing = !playing;
    document.getElementById('btn-play').textContent = playing ? 'Pause' : 'Play';
    lastTime = 0;
  } else if (e.code === 'ArrowRight') {
    e.preventDefault(); playing = false;
    document.getElementById('btn-play').textContent = 'Play';
    setFrame(currentFrame + 1);
  } else if (e.code === 'ArrowLeft') {
    e.preventDefault(); playing = false;
    document.getElementById('btn-play').textContent = 'Play';
    setFrame(currentFrame - 1);
  }
});
</script>
</body>
</html>
